[pytest]
minversion = 9.0
testpaths = tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    -ra
filterwarnings =
    error
    ignore::DeprecationWarning:pytest_sugar
markers =
    unit: single module, no I/O beyond tmp_path
    journey: multi-module project contract tests, local disk only
    live: real upstream process, socket, or LaunchAgent checks
    e2e: full broker/client flow through actual entrypoints
    error_simulation: controlled fault injection for OS or third-party failure paths
