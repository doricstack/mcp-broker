name: Publish MCP Registry

on:
  workflow_run:
    workflows:
      - Publish PyPI
    types:
      - completed
  workflow_dispatch:

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install project
        run: make deps RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"

      - name: Validate registry metadata
        run: |
          ./venv-mcp-broker/bin/python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path
          import jsonschema

          schema_url = "https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json"
          schema = json.load(urllib.request.urlopen(schema_url, timeout=30))
          server = json.loads(Path("registry/server.json").read_text(encoding="utf-8"))
          jsonschema.Draft7Validator(schema).validate(server)
          PY

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: |
          cp registry/server.json server.json
          ./mcp-publisher publish
