name: Publish PyPI

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install project
        run: make setup RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"

      - name: Run release gates
        run: make release-gate RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
