name: Publish Everywhere

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: "Exact release version to publish. Leave empty to use package metadata."
        required: false
        type: string
      release_bump:
        description: "Optional semver bump from package metadata for release planning."
        required: false
        default: current
        type: choice
        options:
          - current
          - patch
          - minor
          - major
  repository_dispatch:
    types:
      - publish-everywhere

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Resolve release version
        run: |
          release_version="${{ inputs.release_version || '' }}"
          release_bump="${{ inputs.release_bump || 'current' }}"
          release_tag="${{ github.event.release.tag_name || '' }}"

          if [[ -n "$release_tag" ]]; then
            release_version="${release_tag#v}"
            release_bump="current"
          fi

          if [[ -n "$release_version" && "$release_bump" != "current" ]]; then
            printf "release_version and release_bump are mutually exclusive\n" >&2
            exit 2
          fi

          args=()
          if [[ -n "$release_version" ]]; then
            args+=(RELEASE_VERSION="$release_version")
          fi
          if [[ "$release_bump" != "current" ]]; then
            args+=(RELEASE_BUMP="$release_bump")
          fi

          version="$(make --no-print-directory release-version-resolve "${args[@]}")"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "NPM_REGISTRY_URL=$(make --no-print-directory print-var VAR=NPM_REGISTRY_URL)" >> "$GITHUB_ENV"
          echo "GHCR_REGISTRY_HOST=$(make --no-print-directory print-var VAR=GHCR_REGISTRY_HOST)" >> "$GITHUB_ENV"
          echo "MCP_PUBLISHER_RELEASE_DOWNLOAD_BASE_URL=$(make --no-print-directory print-var VAR=MCP_PUBLISHER_RELEASE_DOWNLOAD_BASE_URL)" >> "$GITHUB_ENV"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install project
        run: make setup RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"

      - name: Install mcp-publisher
        run: |
          curl -L "${MCP_PUBLISHER_RELEASE_DOWNLOAD_BASE_URL}/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo install -m 0755 mcp-publisher /usr/local/bin/mcp-publisher

      - name: Publish everywhere
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: make release RELEASE_APPLY=1 RELEASE_VERSION="$RELEASE_VERSION" RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"
