name: Publish Everywhere

on:
  release:
    types:
      - published
  workflow_dispatch:
  repository_dispatch:
    types:
      - publish-everywhere

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Resolve release version
        run: |
          version="$(PYTHONPATH="$GITHUB_WORKSPACE/src" python -c 'import mcp_broker, sys; sys.stdout.write(mcp_broker.__version__)')"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install project
        run: make setup RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo install -m 0755 mcp-publisher /usr/local/bin/mcp-publisher

      - name: Publish everywhere
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: make release RELEASE_APPLY=1 RUNTIME_ROOT="$RUNNER_TEMP/mcp-broker"
