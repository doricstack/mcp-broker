[mutmut]
paths_to_mutate=src/mcp_broker
also_copy=
    brand
    config
    docs
    docker
    mk
    mcpb
    npm
    public-export
    registry
    scripts
    .github
    .well-known
    .dockerignore
    CHANGELOG.md
    CONTRIBUTING.md
    glama.json
    LICENSE
    ROADMAP.md
    SECURITY.md
    Dockerfile
    Makefile
    pyproject.toml
    pytest.ini
